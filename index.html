<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- daisyui link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        .active {
            background-color: red;
            color: white;
        }
    </style>

</head>

<body>

    <header class="w-11/12 mx-auto mt-6">

        <!-- navbar strat  -->
        <nav class="flex justify-between">
            <div class="logo ">
                <img src="./Logo.png" alt="">
            </div>
            <div>
                <button class="bg-gray-200 p-2 rounded-sm ">Sort by view</button>
            </div>
            <div>
                <button class="bg-red-500 p-2 rounded-sm text-white text-center">Blog</button>
            </div>
        </nav>
        <!-- navbar fhinisd  -->

        <hr class="mt-4 opacity-30">


        <div id="category-continer" class="flex justify-center items-center gap-5 mt-10">
            <button id="btn-all" onclick="loadVideos()" class="btn btn-sm">all</button>
            <!-- <button class="bg-gray-200 p-2 rounded-sm">Music</button>
            <button class="bg-gray-200 p-2 rounded-sm">Comedy</button>
            <button class="bg-gray-200 p-2 rounded-sm">Drawing</button> -->

        </div>


        <section class=" w-full grid grid-cols-4 gap-6 mt-6" id="videos-container">
            <div class="col-span-full">
                <img class="mx-auto" src="./Icon.png" alt="">

                <h1 class="text-3xl font-bold text-center flex items-center justify-center">Oops!! sorry, There
                    is
                    no content here</h1>
            </div>
        </section>

        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="vedio_details.showModal()">open modal</button>  -->

        <dialog id="video_details" class="modal">
            <div class="modal-box">

                <div id="details-container"></div>

                <h3 class="text-lg font-bold">Hello!</h3>
                <p class="py-4">Press ESC key or click the button below to close</p>

                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn">Close</button>
                    </form>
                </div>

            </div>
        </dialog>

    </header>
    <script src="index.js"></script>
</body>

</html>
